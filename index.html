<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Мои разработки</h1>
    </header>

    <section class="category">
        <h2>Веб-приложения</h2>

            <div class="card" onclick="openModal('project1')">
                <h3>Task Manager</h3>
                <p>Приложение для управления задачами</p>
